name: Release

# Fires when a vX.Y.Z tag is pushed. Builds, packages, and publishes the
# GitHub release with the extension zip attached — so the artifact can never be
# forgotten the way a manual `gh release create` can.
on:
  push:
    tags: ['v*']

# Least privilege: the job needs write only to create the release and upload assets.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      # Node 22 ships npm 10.x; the .npmrc relies on min-release-age (npm 11.10+).
      - run: npm install -g npm@latest
      - run: npm ci
      # Fail fast if the tag and the source version disagree — catches a tag
      # pushed without bumping package.json (or vice versa).
      - name: Check tag matches package.json version
        run: |
          ver="v$(node -p "require('./package.json').version")"
          if [ "$ver" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json ($ver)"
            exit 1
          fi
      # wxt zip builds and packages to .output/<name>-<version>-chrome.zip, with
      # the version auto-stamped from package.json (the tag==version guard above
      # already ensures the tag and the packaged version agree). This flat archive
      # (manifest.json at the root) is the Chrome Web Store upload format.
      - run: npm run zip
      # Also fold the build into a folder named after the repo, so users can
      # download, extract, and "Load unpacked" the resulting <repo>/ directory.
      - name: Package as a repo-named folder (unpacked-install zip)
        run: |
          name="${GITHUB_REPOSITORY##*/}"
          ver="$(node -p "require('./package.json').version")"
          mkdir -p .output/pack
          rm -rf ".output/pack/$name"
          cp -r .output/chrome-mv3 ".output/pack/$name"
          ( cd .output/pack && zip -r "$GITHUB_WORKSPACE/${name}-${ver}.zip" "$name" )
      - name: Publish release with both artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          name="${GITHUB_REPOSITORY##*/}"
          ver="$(node -p "require('./package.json').version")"
          store=$(ls .output/*-chrome.zip | head -n1)
          # Idempotent: attach (replacing) the assets if the release already
          # exists — e.g. a re-run — otherwise create it with auto-generated notes.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${name}-${ver}.zip" "$store" --clobber
          else
            gh release create "$tag" "${name}-${ver}.zip" "$store" --title "$tag" --generate-notes
          fi
